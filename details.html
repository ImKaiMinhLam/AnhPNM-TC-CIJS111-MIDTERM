<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2 class="logo">Anonime</h2>
        <div class="menu">
            <span>Home</span>
            <span>List anime</span>
        </div>
        <input class="search" placeholder="Search anime or movie">
    </div>

    <div class="detail-container">
        <div class="left">
            <h2 id="title" class="detail-title"></h2>
            <div class="video">
                <img id="video-img">
            </div>
            <div class="info">
                <img id="image">
                <div class="info-text">
                    <p id="type"></p>
                    <p id="status"></p>
                    <p id="duration"></p>
                    <p id="genres"></p>
                </div>
            </div>
            <h3>Synopsis</h3>
            <p id="bio" class="bio"></p>
        </div>
        <div class="right">
            <h3 class="section-title">Popular Anime</h3>
            <div id="popular" class="popular"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
</body>
</html>
